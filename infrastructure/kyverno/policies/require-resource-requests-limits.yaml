apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-requests-limits
spec:
  admission: true
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-deployment-container-resources
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaces:
                - default
      skipBackgroundRequests: true
      validate:
        message: "Deployment containers must define cpu/memory requests and limits."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - resources:
                      requests:
                        cpu: "?*"
                        memory: "?*"
                      limits:
                        cpu: "?*"
                        memory: "?*"
