apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: neuroscale-opencost
  namespace: argocd
  annotations:
    # Deploy after policy guardrails so namespace labels are in place
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://github.com/sodiq-code/neuroscale-platform.git
    targetRevision: main
    path: infrastructure/opencost
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: opencost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
