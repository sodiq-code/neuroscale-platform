apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: neuroscale-model-endpoints
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/sodiq-code/neuroscale-platform.git
        revision: main
        directories:
          - path: apps/*
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/sodiq-code/neuroscale-platform.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
