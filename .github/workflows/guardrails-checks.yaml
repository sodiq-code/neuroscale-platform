name: Guardrails Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-kubernetes-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Render and validate Kubernetes manifests
        id: kubeconform
        shell: bash
        run: |
          set -euo pipefail

          bash scripts/ci/render_backstage.sh

          # Validate Kubernetes manifests only.
          # Exclude Kustomize/Helm inputs which are not Kubernetes API objects.
          files=$(find apps bootstrap infrastructure/apps infrastructure/kyverno/policies \
            -type f \
            \( -name '*.yaml' -o -name '*.yml' \) \
            ! -path 'backstage/templates/*' \
            ! -name 'kustomization.yaml')

          rendered_files=$(find .ci/rendered -type f \( -name '*.yaml' -o -name '*.yml' \) 2>/dev/null || true)

          if [ -z "$files" ]; then
            echo "No Kubernetes manifest files found to validate."
            exit 0
          fi

          docker run --rm -v "$PWD:/work" -w /work ghcr.io/yannh/kubeconform:latest \
            -strict \
            -summary \
            -ignore-missing-schemas \
            $files $rendered_files

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          outcome="${{ steps.kubeconform.outcome }}"
          if [ "$outcome" = "success" ]; then icon="✅"; else icon="❌"; fi
          {
            echo "## Guardrails Checks — Schema Validation"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Helm render (backstage chart) | ${icon} ${outcome} |"
            echo "| Schema validation (kubeconform) | ${icon} ${outcome} |"
          } >> "$GITHUB_STEP_SUMMARY"

  validate-policies-against-app-manifests:
    runs-on: ubuntu-latest
    needs:
      - validate-kubernetes-manifests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kyverno policy simulation
        id: kyverno
        shell: bash
        run: |
          set -uo pipefail

          mapfile -t app_files < <(find apps -type f \( -name '*.yaml' -o -name '*.yml' \))
          if [ ${#app_files[@]} -eq 0 ]; then
            echo "No app manifests found under apps/."
            exit 0
          fi

          echo "Running Kyverno policy simulation against ${#app_files[@]} app manifests..."

          # Capture output and exit code separately.
          # kyverno-cli apply may exit 0 even when policy violations exist; we inspect
          # stdout as a second check to guard against the false-green described in
          # docs/REALITY_CHECK_MILESTONE_4_GUARDRAILS.md (Failure 4).
          set +e
          docker run --rm -v "$PWD:/work" -w /work ghcr.io/kyverno/kyverno-cli:v1.12.5 \
            apply infrastructure/kyverno/policies/*.yaml \
            --resource "${app_files[@]}" 2>&1 | tee /tmp/kyverno-output.txt
          kyverno_exit="${PIPESTATUS[0]}"
          set -e

          echo "Kyverno exit code: ${kyverno_exit}"

          # Fail if kyverno returned non-zero (explicit violation)
          # OR if output contains violation markers (guards against exit-code-0 false green).
          if [ "${kyverno_exit}" -ne 0 ] \
              || grep -qE "^FAIL" /tmp/kyverno-output.txt \
              || grep -qE "fail: [1-9][0-9]*" /tmp/kyverno-output.txt; then
            echo ""
            echo "Kyverno policy violations detected. Failing CI."
            exit 1
          fi

          echo "All ${#app_files[@]} app manifests passed Kyverno policy checks."

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          outcome="${{ steps.kyverno.outcome }}"
          if [ "$outcome" = "success" ]; then
            icon="✅"
            detail="> ✅ All app manifests passed all Kyverno policy checks."
          else
            icon="❌"
            detail="> ❌ Policy violations detected. See step logs for details."
          fi
          {
            echo "## Guardrails Checks — Policy Simulation"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Kyverno policy simulation | ${icon} ${outcome} |"
            echo ""
            echo "${detail}"
          } >> "$GITHUB_STEP_SUMMARY"

  resource-cost-proxy:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs:
      - validate-kubernetes-manifests
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Compute resource delta
        id: resource_delta
        shell: python3 {0}
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          import subprocess, os, yaml

          base = os.environ.get('BASE_REF', 'main')
          result = subprocess.run(
              ['git', 'diff', '--name-only', '--diff-filter=ACM',
               f'origin/{base}...HEAD'],
              capture_output=True, text=True
          )
          changed = [
              f for f in result.stdout.strip().split('\n')
              if f.startswith('apps/') and (f.endswith('.yaml') or f.endswith('.yml'))
          ]

          def parse_cpu_m(v):
              if v is None:
                  return 0
              s = str(v)
              return int(s[:-1]) if s.endswith('m') else int(float(s) * 1000)

          def parse_mem_mib(v):
              if v is None:
                  return 0
              s = str(v)
              for suffix, factor in [('Gi', 1024), ('Mi', 1), ('G', 1024), ('M', 1)]:
                  if s.endswith(suffix):
                      return int(float(s[: -len(suffix)]) * factor)
              return 0

          WARN_CPU_M = 2000    # flag workloads requesting >= 2 CPU cores
          WARN_MEM_MIB = 4096  # flag workloads requesting >= 4 GiB memory

          rows = []
          flagged = []
          total_cpu_m = 0
          total_mem_mib = 0

          for filepath in changed:
              if not os.path.exists(filepath):
                  continue
              with open(filepath) as fh:
                  docs = list(yaml.safe_load_all(fh))
              for doc in docs:
                  if not isinstance(doc, dict):
                      continue
                  kind = doc.get('kind', '')
                  name = doc.get('metadata', {}).get('name', '?')
                  cpu_req = '\u2014'
                  mem_req = '\u2014'
                  cpu_m = 0
                  mem_mib = 0

                  if kind == 'Deployment':
                      containers = (
                          doc.get('spec', {})
                          .get('template', {})
                          .get('spec', {})
                          .get('containers', [])
                      )
                      for c in containers:
                          req = c.get('resources', {}).get('requests', {})
                          if req.get('cpu'):
                              cpu_req = str(req['cpu'])
                              cpu_m += parse_cpu_m(req['cpu'])
                          if req.get('memory'):
                              mem_req = str(req['memory'])
                              mem_mib += parse_mem_mib(req['memory'])

                  elif kind == 'InferenceService':
                      model = (
                          doc.get('spec', {})
                          .get('predictor', {})
                          .get('model', {})
                      )
                      req = model.get('resources', {}).get('requests', {})
                      if req.get('cpu'):
                          cpu_req = str(req['cpu'])
                          cpu_m += parse_cpu_m(req['cpu'])
                      if req.get('memory'):
                          mem_req = str(req['memory'])
                          mem_mib += parse_mem_mib(req['memory'])

                  else:
                      continue

                  total_cpu_m += cpu_m
                  total_mem_mib += mem_mib

                  flags = []
                  if cpu_m >= WARN_CPU_M:
                      flags.append('\u26a0\ufe0f HIGH CPU')
                      flagged.append(f'`{name}`: {cpu_req} CPU')
                  if mem_mib >= WARN_MEM_MIB:
                      flags.append('\u26a0\ufe0f HIGH MEM')
                      flagged.append(f'`{name}`: {mem_req} memory')
                  rows.append((filepath, kind, name, cpu_req, mem_req,
                                ' '.join(flags) if flags else '\u2014'))

          lines = ['## \U0001f4b0 Resource Request Delta', '']
          if not rows:
              lines.append(
                  'No `Deployment` or `InferenceService` changes detected in `apps/`.'
              )
              lines.append('')
              lines.append(
                  '> \u2139\ufe0f This check reports resource requests for manifests'
                  ' added or modified under `apps/`.'
              )
          else:
              lines += [
                  '| File | Kind | Name | CPU Request | Memory Request | Flags |',
                  '|------|------|------|-------------|----------------|-------|',
              ]
              for fp, kind, name, cpu, mem, flag in rows:
                  lines.append(
                      f'| `{fp}` | {kind} | `{name}` | `{cpu}` | `{mem}` | {flag} |'
                  )
              lines += [
                  '',
                  f'**Total in this PR:** `{total_cpu_m}m CPU`'
                  f' \u00b7 `{total_mem_mib} MiB memory`',
                  '',
              ]
              if flagged:
                  lines.append(
                      '> \u26a0\ufe0f **High-resource flag:** ' + ', '.join(flagged)
                  )
                  lines.append(
                      '> Review these before merging \u2014 they exceed normal'
                      ' thresholds (2 CPU cores or 4 GiB per workload).'
                  )
              else:
                  lines.append(
                      '> \u2705 All resource requests are within normal thresholds'
                      ' (< 2 CPU cores and < 4 GiB per workload).'
                  )

          body = '\n'.join(lines)
          print(body)

          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
              f.write(body + '\n')

          with open('cost-proxy-comment.md', 'w') as f:
              f.write(body)

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- neuroscale-cost-proxy -->';
            const body = marker + '\n' + fs.readFileSync('cost-proxy-comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
