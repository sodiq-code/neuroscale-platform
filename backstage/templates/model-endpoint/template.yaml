apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: kserve-model-endpoint
  title: KServe model endpoint
  description: Creates a KServe InferenceService + ArgoCD child app via a pull request.
spec:
  owner: user:default/guest
  type: service

  parameters:
    - title: Model endpoint
      required:
        - name
        - owner
        - costCenter
      properties:
        name:
          title: Endpoint name
          type: string
          description: Lowercase DNS label used for Kubernetes + GitOps paths (e.g. "my-model").
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        modelFormat:
          title: Model format
          type: string
          default: sklearn
        storageUri:
          title: Model storage URI
          type: string
          default: gs://kfserving-examples/models/sklearn/1.0/model
        owner:
          title: Owner label
          type: string
          description: Team or individual accountable for this endpoint.
          default: ml-platform
        costCenter:
          title: Cost center label
          type: string
          description: Cost attribution key used by finance and governance.
          default: cc-ml

  steps:
    - id: fetchBase
      name: Render manifests
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          modelFormat: ${{ parameters.modelFormat }}
          storageUri: ${{ parameters.storageUri }}
          owner: ${{ parameters.owner }}
          costCenter: ${{ parameters.costCenter }}

    - id: publishPr
      name: Open pull request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=neuroscale-platform&owner=sodiq-code
        branchName: model-${{ parameters.name }}
        title: Add model endpoint ${{ parameters.name }}
        description: |
          This PR was generated by Backstage Scaffolder.

          It adds:
          - apps/${{ parameters.name }}/inference-service.yaml
          - infrastructure/apps/${{ parameters.name }}-app.yaml
        targetBranchName: main
        sourcePath: .

  output:
    links:
      - title: Pull Request
        url: ${{ steps['publishPr'].output.pullRequestUrl }}
