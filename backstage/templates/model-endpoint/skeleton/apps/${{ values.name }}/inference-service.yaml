apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: ${{ values.name }}
  namespace: default
  labels:
    cost-center: ${{ values.costCenter }}
    owner: ${{ values.owner }}
spec:
  predictor:
    model:
      modelFormat:
        name: ${{ values.modelFormat }}
      storageUri: "${{ values.storageUri }}"
